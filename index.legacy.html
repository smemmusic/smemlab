<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SMEM Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Spectral:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c0d10; --panel:#181a20; --panel-hi:#23262f; --line:#2c2f3a;
    --ink:#ece7da; --muted:#8b8f9c;
    --audio:#ffb454; --audio-dim:#5a4226;
    --control:#4fd6ff; --control-dim:#1f4554;
    --mod-h:402px; --mod-w:268px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(1200px 700px at 80% -10%, #16181f 0%, transparent 60%),
      radial-gradient(900px 600px at 0% 110%, #14161c 0%, transparent 55%),
      var(--bg);
    color:var(--ink); font-family:"Chakra Petch",sans-serif;
    -webkit-font-smoothing:antialiased; overflow-x:hidden;
  }
  body::before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.035;z-index:0;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");}
  .wrap{position:relative;z-index:1;max-width:1320px;margin:0 auto;padding:22px 20px 40px}

  header{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;border-bottom:1px solid var(--line);padding-bottom:14px;flex-wrap:wrap}
  .brand{display:flex;align-items:baseline;gap:14px}
  .brand .mark{font-weight:700;letter-spacing:.32em;font-size:13px;color:var(--audio);text-transform:uppercase}
  .brand h1{font-size:26px;margin:0;font-weight:600;letter-spacing:.02em}
  .brand h1 span{color:var(--muted);font-weight:400}
  .legend{display:flex;gap:18px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .legend i{display:inline-block;width:22px;height:3px;border-radius:2px;margin-right:7px;vertical-align:middle}
  .legend .a i{background:var(--audio);box-shadow:0 0 8px var(--audio)}
  .legend .c i{background:var(--control);box-shadow:0 0 8px var(--control)}

  .narrator{margin:20px 0 8px;padding:16px 20px;border:1px solid var(--line);border-left:3px solid var(--audio);
    background:linear-gradient(180deg,rgba(255,180,84,.05),rgba(255,180,84,0));border-radius:4px;}
  .narrator .step{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--audio);margin-bottom:6px}
  .narrator p{margin:0;font-family:"Spectral",serif;font-size:17px;line-height:1.5;color:#d8d3c7}

  /* lane labels down the left edge */
  .stage{position:relative;overflow-x:auto;padding:8px 4px 16px;scroll-behavior:smooth}
  .stage::-webkit-scrollbar{height:8px}
  .stage::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
  .lane-tag{position:absolute;left:2px;font-size:10px;letter-spacing:.2em;text-transform:uppercase;writing-mode:vertical-rl;transform:rotate(180deg);}
  .lane-tag.audio{top:26px;color:var(--audio);opacity:.7}
  .lane-tag.control{top:calc(var(--mod-h) + 70px);color:var(--control);opacity:.7}

  .rack{display:flex;align-items:flex-start;gap:0;padding-left:26px;min-width:max-content}

  .col{display:flex;flex-direction:column;align-items:center}

  .module{flex:0 0 var(--mod-w);width:var(--mod-w);background:linear-gradient(180deg,var(--panel-hi),var(--panel));
    border:1px solid var(--line);border-radius:10px;padding:16px;position:relative;
    box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 18px 40px -28px #000;display:flex;flex-direction:column;}
  .module.audio-mod{height:var(--mod-h)}
  .module.control-mod{border-color:#2c3a44}
  .module .screw{position:absolute;width:6px;height:6px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#3a3d47,#15171c);box-shadow:0 0 0 1px #000}
  .module .screw.tl{top:8px;left:8px}.module .screw.tr{top:8px;right:8px}
  .module .screw.bl{bottom:8px;left:8px}.module .screw.br{bottom:8px;right:8px}

  .m-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .m-kind{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
  .m-kind.audio{color:var(--audio)} .m-kind.control{color:var(--control)}
  .m-title{font-size:18px;font-weight:600;letter-spacing:.02em;margin:2px 0 0}
  .m-remove{background:none;border:1px solid var(--line);color:var(--muted);width:24px;height:24px;border-radius:5px;cursor:pointer;font-size:13px;line-height:1}
  .m-remove:hover{color:var(--ink);border-color:var(--muted)}

  .screen{position:relative;height:104px;border-radius:6px;background:#070809;border:1px solid #000;overflow:hidden;margin-bottom:14px;box-shadow:0 0 0 1px rgba(255,255,255,.03) inset}
  .screen canvas{display:block;width:100%;height:100%}
  .screen .scanlines{position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.25) 0 1px,transparent 1px 3px);opacity:.5}
  .screen .tag{position:absolute;top:6px;left:8px;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);z-index:2}

  .ctrl{margin:10px 0}
  .ctrl .row{display:flex;justify-content:space-between;align-items:baseline;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
  .ctrl .val{font-variant-numeric:tabular-nums;color:var(--ink);font-size:12px;letter-spacing:.04em}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:26px;background:transparent;cursor:pointer}
  input[type=range]::-webkit-slider-runnable-track{height:4px;border-radius:3px;background:var(--line)}
  input[type=range]::-moz-range-track{height:4px;border-radius:3px;background:var(--line)}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;margin-top:-8px;background:radial-gradient(circle at 35% 30%,#fff,#cfa15e 45%,#8a5f1f);box-shadow:0 2px 5px #000,0 0 0 1px #000}
  input[type=range]::-moz-range-thumb{width:20px;height:20px;border:none;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff,#cfa15e 45%,#8a5f1f);box-shadow:0 2px 5px #000,0 0 0 1px #000}
  .control-mod input[type=range]::-webkit-slider-thumb{background:radial-gradient(circle at 35% 30%,#fff,#5fcdef 45%,#1f6b86)}
  .control-mod input[type=range]::-moz-range-thumb{background:radial-gradient(circle at 35% 30%,#fff,#5fcdef 45%,#1f6b86)}

  .seg{display:flex;gap:4px;margin:4px 0 2px}
  .seg button{flex:1;background:#0f1115;border:1px solid var(--line);color:var(--muted);padding:8px 0;border-radius:5px;font-family:inherit;font-size:11px;letter-spacing:.05em;cursor:pointer}
  .seg button.on{color:#0c0d10;background:var(--audio);border-color:var(--audio);font-weight:600}

  .placard{margin-top:auto;padding-top:12px;border-top:1px dashed var(--line);font-family:"Spectral",serif;font-size:13px;line-height:1.5;color:#bdb9ad}
  .placard b{color:var(--ink);font-weight:500}

  /* horizontal audio cable (amber) */
  .cable.h{flex:0 0 46px;height:var(--mod-h);align-self:flex-start}
  .cable.h svg{width:100%;height:100%;overflow:visible}
  .flow{stroke-dasharray:4 10;animation:flowx 1.1s linear infinite;opacity:0}
  .playing .flow{opacity:1}
  @keyframes flowx{to{stroke-dashoffset:-28}}

  /* vertical control cable (cyan) */
  .cable.v{position:relative;width:var(--mod-w);height:46px;display:flex;justify-content:center}
  .cable.v svg{height:100%;width:46px;overflow:visible}
  .flowy{stroke-dasharray:4 10;animation:flowy 1.0s linear infinite;opacity:0}
  .playing .flowy{opacity:1}
  @keyframes flowy{to{stroke-dashoffset:28}}
  .cv-label{position:absolute;left:calc(50% + 14px);top:50%;transform:translateY(-50%);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--control);white-space:nowrap;opacity:.8}

  .add-slot{flex:0 0 206px;align-self:flex-start;margin-top:calc(var(--mod-h)/2 - 44px)}
  .add-btn{width:100%;background:rgba(255,180,84,.06);border:1.5px dashed var(--audio-dim);color:var(--audio);
    padding:18px 14px;border-radius:10px;cursor:pointer;font-family:inherit;font-size:13px;letter-spacing:.04em;text-align:left;transition:.15s}
  .add-btn:hover{background:rgba(255,180,84,.12);border-color:var(--audio)}
  .add-btn.ctrl{color:var(--control);border-color:var(--control-dim);background:rgba(79,214,255,.06)}
  .add-btn.ctrl:hover{background:rgba(79,214,255,.12);border-color:var(--control)}
  .add-btn .plus{font-size:18px;font-weight:700;margin-right:8px}
  .add-btn small{display:block;color:var(--muted);font-size:11px;margin-top:5px;letter-spacing:.02em}

  .spk{display:flex;align-items:center;gap:10px;color:var(--audio);font-size:11px;letter-spacing:.18em;text-transform:uppercase;margin-top:4px}

  .transport{position:sticky;bottom:0;margin-top:22px;display:flex;align-items:center;gap:18px;padding:16px 20px;border:1px solid var(--line);border-radius:12px;
    background:linear-gradient(180deg,rgba(35,38,47,.92),rgba(18,20,26,.96));backdrop-filter:blur(8px);flex-wrap:wrap}
  .power{display:flex;align-items:center;gap:12px;font-family:inherit;font-size:14px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;
    background:var(--audio);color:#0c0d10;border:none;padding:14px 26px;border-radius:10px;cursor:pointer;box-shadow:0 6px 22px -6px var(--audio)}
  .power.off{background:#22252e;color:var(--ink);box-shadow:none;border:1px solid var(--line)}
  .power .dot{width:11px;height:11px;border-radius:50%;background:#0c0d10}.power.off .dot{background:#444}
  .trigger{font-family:inherit;font-size:14px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;color:var(--control);
    background:rgba(79,214,255,.08);border:1.5px solid var(--control);padding:14px 24px;border-radius:10px;cursor:pointer;user-select:none;touch-action:none}
  .trigger:active,.trigger.held{background:var(--control);color:#0c0d10}
  .trigger[disabled]{opacity:.3;pointer-events:none;border-color:var(--line);color:var(--muted);background:transparent}
  .vol{display:flex;align-items:center;gap:12px;margin-left:auto;min-width:200px;color:var(--muted);font-size:11px;letter-spacing:.14em;text-transform:uppercase}
  .vol input{flex:1}
  .hint{font-family:"Spectral",serif;font-style:italic;color:var(--muted);font-size:14px}
  @media (max-width:560px){.brand h1{font-size:21px}.legend{width:100%}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><span class="mark">SMEM</span><h1>Lab <span>/ signal flow</span></h1></div>
    <div class="legend"><span class="a"><i></i>Audio path</span><span class="c"><i></i>Control path</span></div>
  </header>

  <div class="narrator">
    <div class="step" id="stepLabel">Step 1 — The sound source</div>
    <p id="stepText"></p>
  </div>

  <div class="stage">
    <span class="lane-tag audio">Audio</span>
    <span class="lane-tag control" id="ctrlLaneTag" style="display:none">Control</span>
    <div class="rack" id="rack"></div>
  </div>

  <div class="transport">
    <button class="power off" id="power"><span class="dot"></span><span id="powerLabel">Power</span></button>
    <button class="trigger" id="trigger" disabled>Trigger Note</button>
    <span class="hint" id="hint"></span>
    <div class="vol"><span>Vol</span><input type="range" id="vol" min="0" max="100" value="42"></div>
  </div>
</div>

<script>
(function(){
  "use strict";

  const S = {
    playing:false, held:false,
    blocks:{ filter:false, amp:false, env:false },
    osc:{ type:"sawtooth", freq:110 },
    flt:{ cutoff:1200, q:1 },
    amp:{ db:0 },
    env:{ a:0.05, d:0.2, sustainDb:-8, r:0.4 }
  };

  // gain stages are expressed in decibels and SUM; convert to linear only for the audio nodes
  const DB_FLOOR=-48;
  const ENV_PEAK_BOOST_DB=48;         // dB boost above amp at envelope peak (true dB addition via series). Sustain = peak + env.sustainDb (dB).
  function dbToLin(db){ return db<=-80 ? 0.00001 : Math.pow(10, db/20); }
  function linToDb(l){ return 20*Math.log10(Math.max(l,1e-6)); }

  // ---------- audio ----------
  let ctx=null, oscNode=null, oscTap=null, outTap=null, filterNode=null, vca=null, ampGain=null, master=null;

  function ensureCtx(){
    if(ctx) return;
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    oscTap=ctx.createAnalyser(); oscTap.fftSize=2048;
    outTap=ctx.createAnalyser(); outTap.fftSize=2048;
    filterNode=ctx.createBiquadFilter(); filterNode.type="lowpass";
    filterNode.frequency.value=S.flt.cutoff; filterNode.Q.value=S.flt.q;
    vca=ctx.createGain(); vca.gain.value=1;            // envelope offset (dB), as linear: ~0..1
    ampGain=ctx.createGain(); ampGain.gain.value=1;    // gain offset (dB), as linear: can exceed 1 (boost)
    master=ctx.createGain(); master.gain.value=volToGain(+vol.value);
    const shaper=ctx.createWaveShaper();               // gentle soft-clip: amplification stays safe, saturates rather than clips
    const curve=new Float32Array(1024);
    for(let i=0;i<1024;i++){const xx=(i/1023)*2-1; curve[i]=Math.tanh(xx*1.6);}
    shaper.curve=curve; shaper.oversample="4x";
    ampGain.connect(outTap); outTap.connect(master); master.connect(shaper); shaper.connect(ctx.destination);
  }
  // The amplifier's output (in dB) = gain knob (dB) + control signal (envelope, in dB).
  // In linear terms the two gain nodes sit in series, so the dB values add.
  function idleEnvGain(){ return 1; }   // envelope is a dB offset; idle contributes 0 dB so the amp's offset passes through
  function manualGain(){ return dbToLin(S.blocks.amp ? S.amp.db : 0); }
  function connectGraph(){
    if(!oscNode) return;
    try{oscNode.disconnect();}catch(e){} try{filterNode.disconnect();}catch(e){} try{vca.disconnect();}catch(e){} try{ampGain.disconnect();}catch(e){}
    oscNode.connect(oscTap);                 // raw tap, pre-everything
    let node=oscNode;
    if(S.blocks.filter){ node.connect(filterNode); node=filterNode; }
    node.connect(vca); vca.connect(ampGain); ampGain.connect(outTap);
    vca.gain.cancelScheduledValues(ctx.currentTime);
    vca.gain.setValueAtTime(idleEnvGain(),ctx.currentTime);
    ampGain.gain.setTargetAtTime(manualGain(),ctx.currentTime,0.01);
  }
  function startAudio(){
    ensureCtx(); if(ctx.state==="suspended")ctx.resume();
    oscNode=ctx.createOscillator(); oscNode.type=S.osc.type; oscNode.frequency.value=S.osc.freq; oscNode.start();
    connectGraph();
    master.gain.cancelScheduledValues(ctx.currentTime);
    master.gain.setValueAtTime(0.0001,ctx.currentTime);
    master.gain.exponentialRampToValueAtTime(Math.max(0.0002,volToGain(+vol.value)),ctx.currentTime+0.04);
    S.playing=true;
  }
  function stopAudio(){
    if(!ctx||!oscNode){S.playing=false;return;}
    const t=ctx.currentTime;
    master.gain.cancelScheduledValues(t); master.gain.setValueAtTime(master.gain.value,t);
    master.gain.exponentialRampToValueAtTime(0.0001,t+0.05);
    const o=oscNode; oscNode=null; setTimeout(()=>{try{o.stop();o.disconnect();}catch(e){}},90);
    S.playing=false; S.held=false;
  }
  function volToGain(v){ return (v/100)*0.55; }

  let envStart=0, envPhase="idle";
  function noteOn(){
    if(!S.blocks.env||!ctx||!oscNode) return;
    const t=ctx.currentTime,e=S.env;
    vca.gain.cancelScheduledValues(t);
    vca.gain.setValueAtTime(Math.max(1e-5,vca.gain.value),t);
    vca.gain.exponentialRampToValueAtTime(dbToLin(ENV_PEAK_BOOST_DB),t+e.a);       // peak = +ENV_PEAK_BOOST_DB above amp (multiplied in series with ampGain ⇒ dB sum)
    vca.gain.exponentialRampToValueAtTime(dbToLin(ENV_PEAK_BOOST_DB+e.sustainDb),t+e.a+e.d);  // sustain = peak + sustainDb (dB); sustainDb is the slider's "below peak" amount
    envStart=performance.now(); envPhase="ad"; S.held=true;
  }
  function noteOff(){
    if(!S.blocks.env||!ctx) return;
    const t=ctx.currentTime,e=S.env;
    vca.gain.cancelScheduledValues(t);
    vca.gain.setValueAtTime(Math.max(1e-5,vca.gain.value),t);
    vca.gain.exponentialRampToValueAtTime(1.0,t+e.r);                              // release back to idle (0 dB), not silence
    envStart=performance.now(); envPhase="rel"; S.held=false;
  }

  // ---------- module meta ----------
  const META={
    oscillator:{kind:"audio",title:"Oscillator",placard:"Generates the raw tone. The <b>shape</b> sets which harmonics are present; <b>pitch</b> sets the frequency. The only true sound <b>source</b>."},
    filter:{kind:"audio",title:"Filter",placard:"A low-pass filter removes harmonics <b>above the cutoff</b>, darkening the tone. <b>Resonance</b> emphasises frequencies right at the cutoff."},
    amp:{kind:"audio",title:"Amplifier",placard:"Applies a gain in <b>decibels</b> — an <b>offset</b>, not a scaling. Above 0 dB it amplifies, below it attenuates. A control signal's dB simply <b>adds</b> to this offset."},
    env:{kind:"control",title:"Envelope",placard:"A <b>control</b> signal, not a sound. Its shape is a dB offset — 0 dB at the peak, falling away over time — that <b>adds</b> to the amplifier's gain from below."},
    output:{kind:"audio",title:"Output",placard:"The finished signal reaches the speaker. Compare this scope with the oscillator's — every block has reshaped the wave."}
  };

  const rack=document.getElementById("rack");

  function hcable(){
    const c=document.createElement("div"); c.className="cable h";
    c.innerHTML=`<svg viewBox="0 0 46 402" preserveAspectRatio="none">
      <path d="M0 201 C 18 201,26 201,46 201" fill="none" stroke="var(--audio)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
      <path class="flow" d="M0 201 C 18 201,26 201,46 201" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      <circle cx="2" cy="201" r="3.5" fill="var(--audio)"/><circle cx="44" cy="201" r="3.5" fill="var(--audio)"/></svg>`;
    return c;
  }
  function vcable(){
    const c=document.createElement("div"); c.className="cable v";
    c.innerHTML=`<svg viewBox="0 0 46 46" preserveAspectRatio="none">
      <path d="M23 46 L23 8" fill="none" stroke="var(--control)" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
      <path class="flowy" d="M23 46 L23 8" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      <circle cx="23" cy="44" r="3.5" fill="var(--control)"/>
      <path d="M23 4 L18 13 L28 13 Z" fill="var(--control)"/></svg>
      <span class="cv-label">CV ▸ Gain</span>`;
    return c;
  }

  function moduleEl(id){
    const m=META[id];
    const el=document.createElement("div");
    el.className="module "+(m.kind==="control"?"control-mod":"audio-mod");
    el.dataset.id=id;
    el.innerHTML=`<span class="screw tl"></span><span class="screw tr"></span><span class="screw bl"></span><span class="screw br"></span>`;
    const head=document.createElement("div"); head.className="m-head";
    head.innerHTML=`<div><div class="m-kind ${m.kind}">${m.kind==="control"?"Control":"Audio"} · Module</div><div class="m-title">${m.title}</div></div>`;
    if(id==="filter"||id==="amp"||id==="env"){
      const rm=document.createElement("button"); rm.className="m-remove"; rm.textContent="✕"; rm.title="Remove";
      rm.onclick=()=>removeBlock(id); head.appendChild(rm);
    }
    el.appendChild(head); el.appendChild(buildBody(id));
    return el;
  }

  function buildBody(id){
    const f=document.createElement("div"); f.style.cssText="display:flex;flex-direction:column;flex:1";
    if(id==="oscillator"){
      f.appendChild(screen("scope-osc","Oscilloscope · raw output"));
      f.appendChild(segment(["sine","sawtooth","square","triangle"],["Sine","Saw","Square","Tri"],S.osc.type,v=>{S.osc.type=v;if(oscNode)oscNode.type=v;syncSeg(f,v);}));
      f.appendChild(slider("Pitch",S.osc.freq,55,880,1,"Hz",true,v=>{S.osc.freq=v;if(oscNode)oscNode.frequency.setTargetAtTime(v,ctx.currentTime,0.01);}));
    } else if(id==="filter"){
      f.appendChild(screen("scope-flt","Frequency response"));
      f.appendChild(slider("Cutoff Frequency",S.flt.cutoff,80,12000,1,"Hz",true,v=>{S.flt.cutoff=v;if(filterNode)filterNode.frequency.setTargetAtTime(v,ctx.currentTime,0.01);drawFilter();}));
      f.appendChild(slider("Resonance",S.flt.q,0.1,18,0.1,"Q",false,v=>{S.flt.q=v;if(filterNode)filterNode.Q.setTargetAtTime(v,ctx.currentTime,0.01);drawFilter();}));
    } else if(id==="amp"){
      f.appendChild(screen("meter-amp","Amplifier · output level (dB)"));
      f.appendChild(slider("Gain",S.amp.db,-48,12,0.5,"dB",false,v=>{S.amp.db=v; if(ctx&&ampGain&&S.blocks.amp)ampGain.gain.setTargetAtTime(dbToLin(v),ctx.currentTime,0.01);}));
    } else if(id==="env"){
      f.appendChild(screen("scope-env","Envelope · ADSR (dB)"));
      const g=document.createElement("div"); g.style.cssText="display:grid;grid-template-columns:1fr 1fr;gap:0 14px";
      g.appendChild(slider("Attack",S.env.a,0.005,2,0.005,"s",false,v=>{S.env.a=v;drawEnv();}));
      g.appendChild(slider("Decay",S.env.d,0.005,2,0.005,"s",false,v=>{S.env.d=v;drawEnv();}));
      g.appendChild(slider("Sustain",S.env.sustainDb,-48,0,0.5,"dB",false,v=>{S.env.sustainDb=v;drawEnv();}));
      g.appendChild(slider("Release",S.env.r,0.005,3,0.005,"s",false,v=>{S.env.r=v;drawEnv();}));
      f.appendChild(g);
    } else if(id==="output"){
      f.appendChild(screen("scope-out","Oscilloscope · final signal"));
      const s=document.createElement("div"); s.className="spk";
      s.innerHTML=`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 9v6h4l5 4V5L8 9H4z"/><path d="M16 8c1.5 1.5 1.5 6.5 0 8"/><path d="M19 5c3 3 3 11 0 14"/></svg><span>To speaker</span>`;
      f.appendChild(s);
    }
    const p=document.createElement("div"); p.className="placard"; p.innerHTML=META[id].placard; f.appendChild(p);
    return f;
  }

  function screen(cid,tag){const d=document.createElement("div");d.className="screen";d.innerHTML=`<span class="tag">${tag}</span><canvas id="${cid}"></canvas><span class="scanlines"></span>`;return d;}
  function segment(values,labels,current,cb){const d=document.createElement("div");d.className="seg";values.forEach((v,i)=>{const b=document.createElement("button");b.textContent=labels[i];b.dataset.v=v;if(v===current)b.classList.add("on");b.onclick=()=>cb(v);d.appendChild(b);});return d;}
  function syncSeg(scope,v){scope.querySelectorAll(".seg button").forEach(b=>b.classList.toggle("on",b.dataset.v===v));}
  function slider(label,val,min,max,step,unit,log,cb){
    const d=document.createElement("div"); d.className="ctrl";
    const fmt=x=> unit==="Hz"?Math.round(x)+" Hz":unit==="s"?x.toFixed(x<0.1?3:2)+"s":unit==="Q"?x.toFixed(1):unit==="%"?Math.round(x)+"%":unit==="dB"?(x<=-48?"−∞ dB":(x>0?"+":"")+x.toFixed(1)+" dB"):x.toFixed(2);
    d.innerHTML=`<div class="row"><span>${label}</span><span class="val">${fmt(val)}</span></div>`;
    const inp=document.createElement("input"); inp.type="range";
    if(log){inp.min=0;inp.max=1000;inp.step=1;inp.value=Math.round((Math.log(val/min)/Math.log(max/min))*1000);}
    else{inp.min=min;inp.max=max;inp.step=step;inp.value=val;}
    const valEl=d.querySelector(".val");
    inp.oninput=()=>{let v=log?min*Math.pow(max/min,(+inp.value)/1000):(+inp.value);valEl.textContent=fmt(v);cb(v);};
    d.appendChild(inp); return d;
  }

  function col(){const c=document.createElement("div");c.className="col";return c;}

  function render(){
    rack.innerHTML="";
    const audio=["oscillator"];
    if(S.blocks.filter)audio.push("filter");
    if(S.blocks.amp)audio.push("amp");
    audio.push("output");
    audio.forEach((id,i)=>{
      if(i>0) rack.appendChild(hcable());
      const c=col(); c.appendChild(moduleEl(id));
      if(id==="amp"&&S.blocks.env){ c.appendChild(vcable()); c.appendChild(moduleEl("env")); }
      rack.appendChild(c);
    });
    const next=!S.blocks.filter?"filter":!S.blocks.amp?"amp":!S.blocks.env?"env":null;
    if(next){
      const slot=document.createElement("div"); slot.className="add-slot";
      const b=document.createElement("button"); b.className="add-btn"+(META[next].kind==="control"?" ctrl":"");
      const copy={filter:["Add a Filter","Shape the tone — remove harmonics above a cutoff."],
        amp:["Add an Amplifier","Control loudness. Sets the gain of the audio signal by hand."],
        env:["Add an Envelope","A control signal — patch it into the amp to shape gain over time."]};
      b.innerHTML=`<span class="plus">+</span>${copy[next][0]}<small>${copy[next][1]}</small>`;
      b.onclick=()=>addBlock(next); slot.appendChild(b); rack.appendChild(slot);
    }
    rack.classList.toggle("playing",S.playing);
    document.getElementById("ctrlLaneTag").style.display=S.blocks.env?"block":"none";
    drawFilter(); drawEnv(); updateNarrator(); refreshTrigger();
  }

  function addBlock(id){S.blocks[id]=true;render();if(ctx&&oscNode)connectGraph();
    setTimeout(()=>document.querySelector(".stage").scrollTo({left:9999,behavior:"smooth"}),60);}
  function removeBlock(id){S.blocks[id]=false;if(id==="amp"){S.blocks.env=false;}if(id==="env"||id==="amp")S.held=false;render();if(ctx&&oscNode)connectGraph();}

  function updateNarrator(){
    const L=document.getElementById("stepLabel"),T=document.getElementById("stepText"),H=document.getElementById("hint");
    const b=S.blocks;
    if(!b.filter&&!b.amp){L.textContent="Step 1 — The sound source";
      T.innerHTML="Press <b>POWER</b>. The oscillator is the only part that actually <i>makes</i> sound — watch its raw waveform, try the four shapes, slide the pitch.";
      H.textContent="Just a raw, continuous tone.";
    } else if(b.filter&&!b.amp){L.textContent="Step 2 — Shaping the tone";
      T.innerHTML="Signal flows <b>oscillator → filter → output</b>. Pull the <b>cutoff</b> down and watch the final scope round off as harmonics vanish.";
      H.textContent="Compare the two scopes: raw wave in, filtered wave out.";
    } else if(b.amp&&!b.env){L.textContent="Step 3 — The amplifier";
      T.innerHTML="The <b>amplifier</b> applies a gain in <b>decibels</b>: an <b>offset</b>. Push it above <b>0 dB</b> and it amplifies (louder than the source); pull it below and it attenuates. Next, add an envelope whose dB will add to this offset.";
      H.textContent="Audio path complete: oscillator → filter → amplifier → output.";
    } else if(b.env){L.textContent="Step 4 — Control, from below";
      T.innerHTML="The <span style='color:var(--control)'>envelope</span> is a dB <b>offset</b> that <b>adds</b> to the gain — its peak rides exactly on the <span style='color:var(--control)'>gain line</span> in the meter. Move the gain and the whole shape slides up or down together. Hold <b>TRIGGER</b> to hear it.";
      H.textContent="In decibels, offsets add: gain dB + envelope dB.";
    }
  }

  // ---------- transport ----------
  const power=document.getElementById("power"),powerLabel=document.getElementById("powerLabel"),trigger=document.getElementById("trigger"),vol=document.getElementById("vol");
  power.onclick=()=>{ if(S.playing){stopAudio();power.classList.add("off");powerLabel.textContent="Power";} else {startAudio();power.classList.remove("off");powerLabel.textContent="On";} rack.classList.toggle("playing",S.playing); };
  function refreshTrigger(){ trigger.disabled=!S.blocks.env; }
  const press=e=>{e.preventDefault();if(!S.blocks.env)return;if(!S.playing)power.click();trigger.classList.add("held");noteOn();};
  const release=e=>{e.preventDefault();if(!S.blocks.env)return;trigger.classList.remove("held");noteOff();};
  trigger.addEventListener("pointerdown",press);
  trigger.addEventListener("pointerup",release);
  trigger.addEventListener("pointerleave",e=>{if(S.held)release(e);});
  vol.oninput=()=>{if(master&&ctx)master.gain.setTargetAtTime(volToGain(+vol.value),ctx.currentTime,0.02);};

  // ---------- visualisers ----------
  function fitCanvas(c){const r=c.getBoundingClientRect(),dpr=window.devicePixelRatio||1;
    if(c.width!==r.width*dpr||c.height!==r.height*dpr){c.width=r.width*dpr;c.height=r.height*dpr;}
    const x=c.getContext("2d");x.setTransform(dpr,0,0,dpr,0,0);return{x,w:r.width,h:r.height};}
  function grid(x,w,h){x.strokeStyle="#1c2029";x.lineWidth=1;x.beginPath();for(let i=1;i<4;i++){x.moveTo(0,h*i/4);x.lineTo(w,h*i/4);}for(let i=1;i<6;i++){x.moveTo(w*i/6,0);x.lineTo(w*i/6,h);}x.stroke();}
  function flat(x,w,h,c){x.strokeStyle=c;x.lineWidth=2;x.beginPath();x.moveTo(0,h/2);x.lineTo(w,h/2);x.stroke();}

  function drawScope(cid,an){
    const c=document.getElementById(cid);if(!c)return;const{x,w,h}=fitCanvas(c);x.clearRect(0,0,w,h);grid(x,w,h);
    if(!an){flat(x,w,h,"#3a2f1c");return;}
    const buf=new Uint8Array(an.fftSize);an.getByteTimeDomainData(buf);
    x.lineWidth=2;x.strokeStyle="#ffb454";x.shadowColor="#ffb454";x.shadowBlur=8;x.beginPath();
    const step=buf.length/w;
    for(let i=0;i<w;i++){const v=buf[Math.floor(i*step)]/128-1;const y=h/2-v*(h*0.40);i?x.lineTo(i,y):x.moveTo(i,y);}
    x.stroke();x.shadowBlur=0;
  }

  function drawFilter(){
    const c=document.getElementById("scope-flt");if(!c)return;const{x,w,h}=fitCanvas(c);x.clearRect(0,0,w,h);grid(x,w,h);
    const N=160,minF=20,maxF=20000;const freqs=new Float32Array(N),mag=new Float32Array(N),ph=new Float32Array(N);
    for(let i=0;i<N;i++)freqs[i]=minF*Math.pow(maxF/minF,i/(N-1));
    if(filterNode){filterNode.getFrequencyResponse(freqs,mag,ph);}
    else{const oc=new OfflineAudioContext(1,1,44100);const bq=oc.createBiquadFilter();bq.type="lowpass";bq.frequency.value=S.flt.cutoff;bq.Q.value=S.flt.q;bq.getFrequencyResponse(freqs,mag,ph);}
    x.lineWidth=2;x.strokeStyle="#ffb454";x.shadowColor="#ffb454";x.shadowBlur=8;x.beginPath();
    for(let i=0;i<N;i++){const db=20*Math.log10(Math.max(mag[i],1e-4));const y=h/2-(db/40)*(h/2);const px=(i/(N-1))*w;i?x.lineTo(px,y):x.moveTo(px,y);}
    x.stroke();x.shadowBlur=0;
    const cx=(Math.log(S.flt.cutoff/minF)/Math.log(maxF/minF))*w;
    x.strokeStyle="rgba(255,180,84,.4)";x.setLineDash([3,4]);x.beginPath();x.moveTo(cx,0);x.lineTo(cx,h);x.stroke();x.setLineDash([]);
  }

  function drawEnv(){
    const c=document.getElementById("scope-env");if(!c)return;const{x,w,h}=fitCanvas(c);x.clearRect(0,0,w,h);grid(x,w,h);
    const e=S.env,pad=8,top=14,bot=h-10,total=e.a+e.d+0.45+e.r,sx=(w-pad*2)/total;
    const dbY=db=>bot-(bot-top)*((Math.max(db,DB_FLOOR)-DB_FLOOR)/(0-DB_FLOOR));
    const xA=pad+e.a*sx,xD=xA+e.d*sx,xS=xD+0.45*sx,xR=xS+e.r*sx;
    const yPk=dbY(0),yS=dbY(e.sustainDb),y0=dbY(DB_FLOOR);
    // 0 dB ceiling marker
    x.strokeStyle="rgba(79,214,255,.25)";x.setLineDash([2,4]);x.beginPath();x.moveTo(0,yPk);x.lineTo(w,yPk);x.stroke();x.setLineDash([]);
    x.fillStyle="rgba(79,214,255,.5)";x.font="9px 'Chakra Petch',sans-serif";x.textAlign="left";x.fillText("0 dB",4,yPk-3);
    x.lineWidth=2.4;x.strokeStyle="#4fd6ff";x.shadowColor="#4fd6ff";x.shadowBlur=8;
    x.beginPath();x.moveTo(pad,y0);x.lineTo(xA,yPk);x.lineTo(xD,yS);x.lineTo(xS,yS);x.lineTo(xR,y0);x.stroke();x.shadowBlur=0;
    if(envPhase!=="idle"&&S.playing){
      const el=(performance.now()-envStart)/1000;let px=null;
      if(envPhase==="ad"){let held=pad+Math.min(el,(xS-pad)/sx)*sx;px=Math.min(held,xS);}
      else if(envPhase==="rel"){px=xS+Math.min(el,e.r)*sx;}
      if(px!==null){const yy=px<xA?y0-((px-pad)/(xA-pad))*(y0-yPk):px<xD?yPk+((px-xA)/(xD-xA))*(yS-yPk):px<xS?yS:yS+((px-xS)/(xR-xS))*(y0-yS);
        x.fillStyle="#fff";x.beginPath();x.arc(Math.min(px,xR),yy,3.5,0,7);x.fill();}
    }
  }

  let gainHist=[];
  function drawMeter(){
    const c=document.getElementById("meter-amp");if(!c)return;const{x,w,h}=fitCanvas(c);x.clearRect(0,0,w,h);grid(x,w,h);
    const M_TOP=12,M_FLR=-48,top=14,bot=h-4,dbY=db=>bot-(bot-top)*((Math.min(Math.max(db,M_FLR),M_TOP)-M_FLR)/(M_TOP-M_FLR));
    const ampDb=S.blocks.amp?S.amp.db:0;
    const envDb=(S.playing&&vca)?linToDb(vca.gain.value):(S.blocks.env?-80:0);
    const totalDb=(S.playing)?Math.max(M_FLR,ampDb+Math.max(envDb,M_FLR)):M_FLR;
    gainHist.push(totalDb);if(gainHist.length>180)gainHist.shift();
    const n=gainHist.length,X=i=>(i/179)*w;
    // amplification zone above 0 dB
    x.fillStyle="rgba(255,180,84,.05)";x.fillRect(0,top,w,dbY(0)-top);
    // 0 dB unity line
    x.strokeStyle="rgba(255,180,84,.2)";x.setLineDash([2,4]);x.beginPath();x.moveTo(0,dbY(0));x.lineTo(w,dbY(0));x.stroke();x.setLineDash([]);
    x.fillStyle="rgba(255,180,84,.4)";x.font="9px 'Chakra Petch',sans-serif";x.textAlign="left";x.fillText("0 dB",4,dbY(0)-3);
    // gain OFFSET line — the envelope's peak rides on this; moving Gain slides it up/down
    x.strokeStyle="rgba(79,214,255,.55)";x.setLineDash([5,4]);x.beginPath();x.moveTo(0,dbY(ampDb));x.lineTo(w,dbY(ampDb));x.stroke();x.setLineDash([]);
    x.fillStyle="rgba(79,214,255,.8)";x.textAlign="right";x.fillText("gain offset",w-8,dbY(ampDb)-3);
    // total level over time
    x.beginPath();x.moveTo(0,bot);for(let i=0;i<n;i++)x.lineTo(X(i),dbY(gainHist[i]));x.lineTo(X(n-1),bot);x.closePath();
    x.fillStyle="rgba(255,180,84,.12)";x.fill();
    x.beginPath();for(let i=0;i<n;i++){i?x.lineTo(X(i),dbY(gainHist[i])):x.moveTo(X(i),dbY(gainHist[i]));}
    x.lineWidth=2;x.strokeStyle="#ffb454";x.shadowColor="#ffb454";x.shadowBlur=8;x.stroke();x.shadowBlur=0;
    // readout: the dB sum
    x.font="600 12px 'Chakra Petch',sans-serif";x.textAlign="right";x.fillStyle="#ffb454";
    x.fillText((totalDb<=M_FLR?"−∞":(totalDb>0?"+":"")+totalDb.toFixed(1))+" dB",w-8,h-9);
    if(S.blocks.env){
      x.textAlign="left";x.font="9px 'Chakra Petch',sans-serif";x.fillStyle="rgba(236,231,218,.6)";
      const a=(ampDb>0?"+":"")+ampDb.toFixed(0), e=(envDb<=M_FLR?"−∞":(envDb>0?"+":"")+envDb.toFixed(0));
      x.fillText("gain "+a+"  +  env "+e,6,h-9);
    }
  }

  function loop(){
    drawScope("scope-osc",S.playing?oscTap:null);
    drawScope("scope-out",S.playing?outTap:null);
    if(document.getElementById("meter-amp"))drawMeter();
    if(document.getElementById("scope-env"))drawEnv();
    requestAnimationFrame(loop);
  }

  render(); loop();
  window.addEventListener("resize",drawFilter);
})();
</script>
</body>
</html>
